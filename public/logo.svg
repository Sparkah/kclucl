    <path d="M24 8 C20 8 12 14 4 22 C8 20 12 20 14 22 C14 26 16 30 20 32 L20 38 L18 42 L22 40 L24 44 L26 40 L30 42 L28 38 L28 32 C32 30 34 26 34 22 C36 20 40 20 44 22 C36 14 28 8 24 8Z" fill="#a855f7"/>
    <circle cx="20" cy="20" r="2" fill="#e0e7ff"/>
    <circle cx="28" cy="20" r="2" fill="#e0e7ff"/>
  </g>
