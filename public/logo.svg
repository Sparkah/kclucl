      <stop offset="100%" stop-color="#b44aff"/>
    </linearGradient>
  </defs>
  <!-- BG -->
  <rect width="768" height="512" rx="48" fill="url(#bg)"/>
  <rect x="1" y="1" width="766" height="510" rx="47" stroke="url(#accent)" stroke-width="2" stroke-opacity="0.15" fill="none"/>

  <!-- Big Doge hero mascot — left side -->
  <g transform="translate(40, 60) scale(4.2)">
    <ellipse cx="24" cy="26" rx="16" ry="18" fill="#fbbf24"/>
